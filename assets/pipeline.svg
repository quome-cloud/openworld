<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 566" width="1200" height="566"
     font-family="'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcfbf8"/><stop offset="1" stop-color="#eef0ec"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="gBuild" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gOpt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b45309"/><stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gDep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0 H0 V26" fill="none" stroke="#8aa0c2" stroke-width="0.6" opacity="0.20"/>
    </pattern>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#16202e" flood-opacity="0.15"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
    <clipPath id="c1"><rect x="44" y="76" width="336" height="182" rx="17"/></clipPath>
    <clipPath id="c2"><rect x="432" y="76" width="336" height="182" rx="17"/></clipPath>
    <clipPath id="c3"><rect x="820" y="76" width="336" height="182" rx="17"/></clipPath>
  </defs>

  <rect width="1200" height="566" fill="url(#bg)"/>
  <rect width="1200" height="566" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#acc)"/>
  <g stroke="#1d4ed8" stroke-width="1.5" opacity="0.45" fill="none">
    <path d="M28 44 L28 28 L44 28"/><path d="M1172 44 L1172 28 L1156 28"/>
    <path d="M28 524 L28 538 L44 538"/><path d="M1172 524 L1172 538 L1156 538"/>
  </g>

  <!-- ============ STAGE CARDS ============ -->
  <!-- BUILD -->
  <g filter="url(#sh)"><rect x="44" y="76" width="336" height="182" rx="17" fill="#ffffff"/></g>
  <g clip-path="url(#c1)"><rect x="44" y="76" width="336" height="7" fill="url(#gBuild)"/></g>
  <rect x="44" y="76" width="336" height="182" rx="17" fill="none" stroke="#dde2ea" stroke-width="1.5"/>
  <circle cx="80" cy="116" r="15" fill="#eaeef6"/><text x="80" y="122" text-anchor="middle" font-size="17" font-weight="800" fill="#1d4ed8" font-family="ui-monospace,Menlo,monospace">1</text>
  <text x="108" y="122" font-size="24" font-weight="800" letter-spacing="3" fill="#1d4ed8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">BUILD</text>
  <text x="72" y="158" font-size="18" fill="#16202e">Describe it in plain terms —</text>
  <text x="72" y="184" font-size="18" fill="#16202e"><tspan font-weight="700">Claude Code</tspan> writes and</text>
  <text x="72" y="210" font-size="18" fill="#16202e"><tspan font-weight="700">verifies</tspan> the code dynamics.</text>
  <rect x="72" y="226" width="150" height="22" rx="11" fill="#eaeef6"/><text x="147" y="241" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="0.6" fill="#1e3a8a" font-family="ui-monospace,Menlo,monospace">0 training data</text>

  <!-- OPTIMIZE -->
  <g filter="url(#sh)"><rect x="432" y="76" width="336" height="182" rx="17" fill="#ffffff"/></g>
  <g clip-path="url(#c2)"><rect x="432" y="76" width="336" height="7" fill="url(#gOpt)"/></g>
  <rect x="432" y="76" width="336" height="182" rx="17" fill="none" stroke="#dde2ea" stroke-width="1.5"/>
  <circle cx="468" cy="116" r="15" fill="#f6eee2"/><text x="468" y="122" text-anchor="middle" font-size="17" font-weight="800" fill="#b45309" font-family="ui-monospace,Menlo,monospace">2</text>
  <text x="496" y="122" font-size="24" font-weight="800" letter-spacing="3" fill="#b45309" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">OPTIMIZE</text>
  <text x="460" y="158" font-size="18" fill="#16202e">Tune <tspan font-weight="700">dials &amp; dynamics</tspan></text>
  <text x="460" y="184" font-size="18" fill="#16202e">against a goal —</text>
  <text x="460" y="210" font-size="18" fill="#16202e">Study · sweep · dials.</text>
  <rect x="460" y="226" width="132" height="22" rx="11" fill="#f6eee2"/><text x="526" y="241" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="0.6" fill="#9a4408" font-family="ui-monospace,Menlo,monospace">goal-directed</text>

  <!-- DEPLOY -->
  <g filter="url(#sh)"><rect x="820" y="76" width="336" height="182" rx="17" fill="#ffffff"/></g>
  <g clip-path="url(#c3)"><rect x="820" y="76" width="336" height="7" fill="url(#gDep)"/></g>
  <rect x="820" y="76" width="336" height="182" rx="17" fill="none" stroke="#dde2ea" stroke-width="1.5"/>
  <circle cx="856" cy="116" r="15" fill="#e3f1ee"/><text x="856" y="122" text-anchor="middle" font-size="17" font-weight="800" fill="#0f766e" font-family="ui-monospace,Menlo,monospace">3</text>
  <text x="884" y="122" font-size="24" font-weight="800" letter-spacing="3" fill="#0f766e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DEPLOY</text>
  <text x="848" y="158" font-size="18" fill="#16202e"><tspan font-weight="700">FastAPI</tspan> + live React Flow.</text>
  <text x="848" y="185" font-size="16" fill="#1e3a8a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">/step /predict /run</text>
  <text x="848" y="209" font-size="16" fill="#1e3a8a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">/observe · WS /live</text>
  <rect x="848" y="226" width="176" height="22" rx="11" fill="#e3f1ee"/><text x="936" y="241" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="0.6" fill="#0b5c56" font-family="ui-monospace,Menlo,monospace">stateless forward pass</text>

  <!-- spec arrows between cards -->
  <g>
    <line x1="384" y1="167" x2="424" y2="167" stroke="#1d4ed8" stroke-width="2.4" marker-end="url(#arr)"/>
    <rect x="382" y="138" width="46" height="21" rx="10.5" fill="#ffffff" stroke="#c7d2ea" stroke-width="1"/>
    <text x="405" y="153" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="0.8" fill="#1d4ed8" font-family="ui-monospace,Menlo,monospace">spec</text>
  </g>
  <g>
    <line x1="772" y1="167" x2="812" y2="167" stroke="#1d4ed8" stroke-width="2.4" marker-end="url(#arr)"/>
    <rect x="770" y="138" width="46" height="21" rx="10.5" fill="#ffffff" stroke="#c7d2ea" stroke-width="1"/>
    <text x="793" y="153" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="0.8" fill="#1d4ed8" font-family="ui-monospace,Menlo,monospace">spec</text>
  </g>

  <!-- central spec ribbon -->
  <line x1="212" y1="258" x2="212" y2="298" stroke="#9db0d0" stroke-width="1.6" stroke-dasharray="2 4"/>
  <line x1="988" y1="258" x2="988" y2="298" stroke="#9db0d0" stroke-width="1.6" stroke-dasharray="2 4"/>
  <g filter="url(#sh)"><rect x="322" y="286" width="556" height="34" rx="17" fill="#16202e"/></g>
  <text y="308" font-size="14" text-anchor="middle">
    <tspan x="418" font-weight="600" fill="#eef1f6">one portable</tspan>
    <tspan x="512" font-weight="800" fill="#7fb0ff">JSON spec</tspan>
    <tspan x="568" font-weight="700" fill="#8a97ab">·</tspan>
    <tspan x="676" font-weight="600" fill="#eef1f6">one self-contained</tspan>
    <tspan x="798" font-weight="800" fill="#5ecfc4">SVG card</tspan>
  </text>

  <!-- ============ WORLD BOUNDARY ROW ============ -->
  <!-- perceive -->
  <text x="196" y="418" text-anchor="middle" font-size="17" font-weight="800" letter-spacing="2.5" fill="#0f766e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">PERCEIVE</text>
  <text x="196" y="442" text-anchor="middle" font-size="14" fill="#5b6675" font-style="italic">text in</text>
  <line x1="266" y1="430" x2="356" y2="430" stroke="#1d4ed8" stroke-width="2.6" marker-end="url(#arr)"/>

  <!-- WORLD panel -->
  <g filter="url(#sh)"><rect x="366" y="360" width="468" height="140" rx="18" fill="#f4f6fb"/></g>
  <rect x="366" y="360" width="468" height="140" rx="18" fill="none" stroke="#c7d2ea" stroke-width="1.6"/>
  <!-- nested-worlds mark -->
  <g transform="translate(438,420)">
    <rect x="-38" y="-38" width="76" height="76" rx="13" fill="#ffffff" stroke="#1d4ed8" stroke-width="4.2"/>
    <rect x="-23" y="-23" width="46" height="46" rx="9" fill="none" stroke="#b45309" stroke-width="3.6"/>
    <rect x="-9" y="-9" width="18" height="18" rx="5" fill="#0f766e"/>
  </g>
  <text x="506" y="408" font-size="30" font-weight="800" letter-spacing="6" fill="#16202e">WORLD</text>
  <text x="506" y="434" font-size="15.5" fill="#3b4655">verified symbolic state + code dynamics</text>
  <line x1="506" y1="448" x2="806" y2="448" stroke="#dde2ea" stroke-width="1.2"/>
  <text x="506" y="472" font-size="13.5" fill="#5b6675" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">compose: worlds-within-worlds · bridges · roll-ups</text>

  <!-- emit -->
  <line x1="844" y1="430" x2="934" y2="430" stroke="#1d4ed8" stroke-width="2.6" marker-end="url(#arr)"/>
  <text x="1004" y="418" text-anchor="middle" font-size="17" font-weight="800" letter-spacing="2.5" fill="#1d4ed8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">EMIT</text>
  <text x="1004" y="442" text-anchor="middle" font-size="14" fill="#5b6675" font-style="italic">report out</text>
</svg>
