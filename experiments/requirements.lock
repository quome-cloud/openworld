# Pinned analysis stack for reproducing the experiments and paper assets.
# The core library (`import openworld`) needs NONE of these — it is stdlib-only.
# These pin the optional `experiments` extra used by the experiment scripts and
# scripts/make_paper_assets.py, so figure/number regeneration is reproducible.
#
#   python -m venv .venv && . .venv/bin/activate
#   pip install -e ".[dev]" -r experiments/requirements.lock
#
# Interpreter the cached results + paper assets were produced on: CPython 3.14.6.
