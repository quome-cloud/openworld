<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1252 792" font-family="DejaVu Sans, Verdana, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a8a3e"/>
    </marker>
    <marker id="arO" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8881f"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="122%">
      <feDropShadow dx="0" dy="2.2" stdDeviation="3.2" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .t   { fill:#0f172a; }
      .mut { fill:#64748b; }
      .ttl { font-weight:700; }
      .lbl { font-size:12.5px; fill:#475569; }
      .code{ font-family:"DejaVu Sans Mono","Menlo",monospace; }
      .step{ font-size:20px; font-weight:700; }
      .desc{ font-size:12px; fill:#334155; }
      .cap { font-size:11px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1252" height="792" fill="#ffffff"/>

  <!-- ================= title ================= -->
  <text x="40" y="40" class="t ttl" font-size="23">Solving ARC-AGI-3 by building a verified-code world model</text>
  <text x="40" y="63" class="mut" font-size="13.5">The agent never reads game code. It <tspan font-weight="700" fill="#334155">acts</tspan>, <tspan font-weight="700" fill="#334155">writes a program</tspan> that predicts the dynamics, <tspan font-weight="700" fill="#334155">reasons</tspan> the goal, <tspan font-weight="700" fill="#334155">plans</tspan> through it, and <tspan font-weight="700" fill="#334155">replay-verifies</tspan> &#8212; every solve is a serveable World.</text>

  <!-- ================= environment (process-isolated) ================= -->
  <g filter="url(#sh)">
    <rect x="36" y="132" width="196" height="286" rx="14" fill="#eef2f7" stroke="#334155" stroke-width="1.6"/>
  </g>
  <rect x="36" y="132" width="196" height="34" rx="14" fill="#334155"/>
  <rect x="36" y="150" width="196" height="16" fill="#334155"/>
  <text x="134" y="154" text-anchor="middle" fill="#ffffff" class="ttl" font-size="13.5">ARC-AGI-3 environment</text>
  <text x="134" y="184" text-anchor="middle" class="mut" font-size="11.5">process-isolated game</text>
  <!-- 8x8 colored grid glyph -->
  <g transform="translate(74,198)">
    <rect x="-6" y="-6" width="132" height="132" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <g>
      <rect x="0"  y="0"  width="15" height="15" fill="#1f4e79"/><rect x="15" y="0" width="15" height="15" fill="#eef2f7"/><rect x="30" y="0" width="15" height="15" fill="#c8881f"/><rect x="45" y="0" width="15" height="15" fill="#eef2f7"/><rect x="60" y="0" width="15" height="15" fill="#2a8a7f"/><rect x="75" y="0" width="15" height="15" fill="#eef2f7"/><rect x="90" y="0" width="15" height="15" fill="#2a8a3e"/><rect x="105" y="0" width="15" height="15" fill="#eef2f7"/>
      <rect x="0" y="15" width="15" height="15" fill="#eef2f7"/><rect x="15" y="15" width="15" height="15" fill="#2a8a7f"/><rect x="30" y="15" width="15" height="15" fill="#eef2f7"/><rect x="45" y="15" width="15" height="15" fill="#1f4e79"/><rect x="60" y="15" width="15" height="15" fill="#eef2f7"/><rect x="75" y="15" width="15" height="15" fill="#c8881f"/><rect x="90" y="15" width="15" height="15" fill="#eef2f7"/><rect x="105" y="15" width="15" height="15" fill="#2a8a7f"/>
      <rect x="0" y="30" width="120" height="15" fill="#eef2f7"/>
      <rect x="0" y="45" width="15" height="15" fill="#c8881f"/><rect x="30" y="45" width="15" height="15" fill="#2a8a3e"/><rect x="60" y="45" width="15" height="15" fill="#1f4e79"/><rect x="90" y="45" width="15" height="15" fill="#c8881f"/>
      <rect x="15" y="60" width="15" height="15" fill="#2a8a7f"/><rect x="45" y="60" width="15" height="15" fill="#eef2f7"/><rect x="75" y="60" width="15" height="15" fill="#1f4e79"/><rect x="105" y="60" width="15" height="15" fill="#2a8a3e"/>
      <rect x="0" y="75" width="120" height="15" fill="#eef2f7"/>
      <!-- status bar (masked) -->
      <rect x="0" y="100" width="120" height="14" rx="2" fill="#0f172a" opacity="0.82"/>
      <text x="60" y="110" text-anchor="middle" fill="#ffffff" font-size="8.5">status bar &#187; masked</text>
    </g>
  </g>
  <text x="134" y="356" text-anchor="middle" class="mut code" font-size="10.5">reset() &#183; step(a)</text>
  <text x="134" y="373" text-anchor="middle" class="mut" font-size="10.5">&#187; frame, levels, done</text>
  <text x="134" y="399" text-anchor="middle" class="mut" font-size="10.5" font-style="italic">deterministic: replay reproduces</text>

  <!-- ================= source-free boundary ================= -->
  <line x1="262" y1="96" x2="262" y2="470" stroke="#b91c1c" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="262" y="88" text-anchor="middle" fill="#b91c1c" class="ttl" font-size="12">source-free boundary</text>
  <text x="262" y="486" text-anchor="middle" fill="#b91c1c" font-size="10.5">agent&#8217;s Python cannot import the engine &#183; no game code crosses</text>

  <!-- env <-> agent info flow -->
  <path d="M232,214 L300,214" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="281" y="205" text-anchor="middle" class="lbl">observe</text>
  <path d="M300,250 L232,250" stroke="#c8881f" stroke-width="2" fill="none" marker-end="url(#arO)"/>
  <text x="279" y="272" text-anchor="middle" class="lbl" fill="#c8881f">act step(a)</text>

  <!-- ================= the agent loop: 6 pipeline stages ================= -->
  <!-- geometry: 6 boxes w=128 h=150 at y=140, x = 300,462,624,786,948,1110 (gap 34) -->

  <!-- helper visual: reused per box drawn explicitly below -->
  <!-- S1 PERCEIVE (teal) -->
  <g filter="url(#sh)"><rect x="300" y="140" width="128" height="150" rx="12" fill="#ffffff" stroke="#2a8a7f" stroke-width="1.8"/></g>
  <rect x="300" y="140" width="128" height="8" rx="4" fill="#2a8a7f"/>
  <circle cx="318" cy="168" r="13" fill="#2a8a7f"/><text x="318" y="174" text-anchor="middle" fill="#fff" class="step" font-size="14">1</text>
  <text x="342" y="173" class="t ttl" font-size="14.5">Perceive</text>
  <text x="314" y="200" class="desc">Masked-frame</text>
  <text x="314" y="216" class="desc">perceptor:</text>
  <text x="314" y="234" class="desc code" font-size="11">pixels &#187; state</text>
  <text x="314" y="258" class="desc mut" font-size="10.5">mask the status bar</text>
  <text x="314" y="272" class="desc mut" font-size="10.5">so states don&#8217;t explode</text>

  <!-- S2 EXPLORE (blue) -->
  <g filter="url(#sh)"><rect x="462" y="140" width="128" height="150" rx="12" fill="#ffffff" stroke="#1f4e79" stroke-width="1.8"/></g>
  <rect x="462" y="140" width="128" height="8" rx="4" fill="#1f4e79"/>
  <circle cx="480" cy="168" r="13" fill="#1f4e79"/><text x="480" y="174" text-anchor="middle" fill="#fff" class="step" font-size="14">2</text>
  <text x="504" y="173" class="t ttl" font-size="14.5">Explore</text>
  <text x="476" y="200" class="desc">Act to gather</text>
  <text x="476" y="218" class="desc code" font-size="11">(s, a, s')</text>
  <text x="476" y="234" class="desc">transitions.</text>
  <text x="476" y="260" class="desc mut" font-size="10.5">the environment</text>
  <text x="476" y="274" class="desc mut" font-size="10.5">is ground truth</text>

  <!-- S3 SYNTHESIZE / GENERATE PROGRAM (ochre, emphasized) -->
  <g filter="url(#sh)"><rect x="624" y="132" width="128" height="166" rx="12" fill="#fdf6ea" stroke="#c8881f" stroke-width="2.4"/></g>
  <rect x="624" y="132" width="128" height="9" rx="4.5" fill="#c8881f"/>
  <circle cx="642" cy="162" r="13" fill="#c8881f"/><text x="642" y="168" text-anchor="middle" fill="#fff" class="step" font-size="14">3</text>
  <text x="666" y="167" class="t ttl" font-size="14">Synthesize</text>
  <text x="638" y="188" class="ttl" font-size="11" fill="#c8881f">GENERATE PROGRAM</text>
  <text x="638" y="208" class="desc code" font-size="10.5">predict(frame,</text>
  <text x="638" y="222" class="desc code" font-size="10.5">        action)</text>
  <text x="638" y="242" class="desc" font-size="11">an LLM writes the</text>
  <text x="638" y="257" class="desc" font-size="11">world model in code</text>
  <text x="638" y="283" class="desc mut" font-size="10">retries on</text>
  <text x="638" y="293" class="desc mut" font-size="10">counterexamples</text>

  <!-- S4 REASON GOAL (blue) -->
  <g filter="url(#sh)"><rect x="786" y="140" width="128" height="150" rx="12" fill="#ffffff" stroke="#1f4e79" stroke-width="1.8"/></g>
  <rect x="786" y="140" width="128" height="8" rx="4" fill="#1f4e79"/>
  <circle cx="804" cy="168" r="13" fill="#1f4e79"/><text x="804" y="174" text-anchor="middle" fill="#fff" class="step" font-size="14">4</text>
  <text x="828" y="173" class="t ttl" font-size="14.5">Reason goal</text>
  <text x="800" y="200" class="desc">Infer what raises</text>
  <text x="800" y="216" class="desc code" font-size="10.5">levels_completed</text>
  <text x="800" y="234" class="desc">&#187; a CodeObjective.</text>
  <text x="800" y="260" class="desc mut" font-size="10.5">the win is a</text>
  <text x="800" y="274" class="desc mut" font-size="10.5"><tspan font-style="italic">procedure</tspan>, not a state</text>

  <!-- S5 PLAN (teal) -->
  <g filter="url(#sh)"><rect x="948" y="140" width="128" height="150" rx="12" fill="#ffffff" stroke="#2a8a7f" stroke-width="1.8"/></g>
  <rect x="948" y="140" width="128" height="8" rx="4" fill="#2a8a7f"/>
  <circle cx="966" cy="168" r="13" fill="#2a8a7f"/><text x="966" y="174" text-anchor="middle" fill="#fff" class="step" font-size="14">5</text>
  <text x="990" y="173" class="t ttl" font-size="14.5">Plan</text>
  <text x="962" y="200" class="desc">Search action</text>
  <text x="962" y="216" class="desc">sequences <tspan font-style="italic">through</tspan></text>
  <text x="962" y="232" class="desc">the verified model</text>
  <text x="962" y="258" class="desc mut" font-size="10.5">BFS / beam / CEM</text>
  <text x="962" y="272" class="desc mut" font-size="10.5">&#8220;in imagination&#8221;</text>

  <!-- S6 VERIFY (green) -->
  <g filter="url(#sh)"><rect x="1110" y="140" width="128" height="150" rx="12" fill="#ffffff" stroke="#2a8a3e" stroke-width="1.8"/></g>
  <rect x="1110" y="140" width="128" height="8" rx="4" fill="#2a8a3e"/>
  <circle cx="1128" cy="168" r="13" fill="#2a8a3e"/><text x="1128" y="174" text-anchor="middle" fill="#fff" class="step" font-size="14">6</text>
  <text x="1152" y="173" class="t ttl" font-size="14.5">Verify</text>
  <text x="1124" y="200" class="desc">Replay the plan</text>
  <text x="1124" y="216" class="desc">on the <tspan font-weight="700">real</tspan> engine.</text>
  <text x="1124" y="238" class="desc"><tspan font-weight="700" fill="#2a8a3e">Win?</tspan> bank.</text>
  <text x="1124" y="256" class="desc">Else &#187; loop.</text>

  <!-- pipeline arrows between stages -->
  <path d="M428,215 L462,215" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
  <path d="M590,215 L624,215" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="607" y="207" text-anchor="middle" class="lbl" font-size="10.5">transitions</text>
  <path d="M752,215 L786,215" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="769" y="207" text-anchor="middle" class="lbl" font-size="10">verified</text>
  <text x="769" y="230" text-anchor="middle" class="lbl" font-size="10">model</text>
  <path d="M914,215 L948,215" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="931" y="207" text-anchor="middle" class="lbl" font-size="10">goal</text>
  <path d="M1076,215 L1110,215" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="1093" y="207" text-anchor="middle" class="lbl" font-size="9.5">plan</text>

  <!-- ============ the two verification GATES ============ -->
  <g>
    <rect x="600" y="316" width="196" height="30" rx="8" fill="#fdf6ea" stroke="#c8881f" stroke-width="1.3"/>
    <text x="612" y="335" class="ttl" fill="#c8881f" font-size="11.5">Gate 1</text>
    <text x="656" y="335" class="cap" fill="#7c5310">code accepted only if it</text>
    <path d="M688,298 L690,316" stroke="#c8881f" stroke-width="1.3" fill="none" marker-end="url(#arO)"/>
  </g>
  <text x="612" y="360" class="cap" fill="#7c5310">exact-matches held-out (s,a,s')</text>

  <g>
    <rect x="1042" y="316" width="200" height="30" rx="8" fill="#e9f4ec" stroke="#2a8a3e" stroke-width="1.3"/>
    <text x="1054" y="335" class="ttl" fill="#2a8a3e" font-size="11.5">Gate 2</text>
    <text x="1098" y="335" class="cap" fill="#1f5f2e">plan banked only if it</text>
    <path d="M1150,290 L1150,316" stroke="#2a8a3e" stroke-width="1.3" fill="none" marker-end="url(#arG)"/>
  </g>
  <text x="1054" y="360" class="cap" fill="#1f5f2e">replay-verifies on the real engine</text>

  <!-- ============ feedback loop: not solved -> re-explore / re-synthesize ============ -->
  <path d="M1174,290 C1174,400 900,404 526,404 C420,404 380,404 380,404" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <path d="M380,404 L380,290" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <text x="760" y="398" text-anchor="middle" class="mut" font-size="11.5" font-style="italic">not solved &#187; explore more, re-synthesize, re-plan</text>

  <!-- act arrow back to env (explore + replay call step) : from box2/box6 down-left to env -->
  <!-- (kept implicit via the 'act step(a)' arrow at the boundary) -->

  <!-- ============ verified win -> THE WORLD ============ -->
  <path d="M1174,290 L1174,430 L760,430 L760,470" stroke="#2a8a3e" stroke-width="2.6" fill="none" marker-end="url(#arG)"/>
  <rect x="980" y="418" width="150" height="26" rx="8" fill="#2a8a3e"/>
  <text x="1055" y="436" text-anchor="middle" fill="#ffffff" class="ttl" font-size="12">verified win &#187; bank</text>

  <!-- ================= THE WORLD (the representation artifact) ================= -->
  <g filter="url(#sh)"><rect x="300" y="474" width="938" height="196" rx="16" fill="#f8fafc" stroke="#1f4e79" stroke-width="2"/></g>
  <rect x="300" y="474" width="938" height="38" rx="16" fill="#1f4e79"/>
  <rect x="300" y="494" width="938" height="18" fill="#1f4e79"/>
  <text x="322" y="500" fill="#ffffff" class="ttl" font-size="15">The world-model representation &#8212; every solve is a serveable OpenWorld <tspan class="code" font-size="14">World</tspan></text>
  <text x="1216" y="500" text-anchor="end" fill="#cfe0f0" font-size="11.5">verified &#183; round-trips &#183; renders the atlas</text>

  <!-- three stacked layers of the World: perceptor / transition / objective -->
  <!-- L1 perceptor (teal) -->
  <g filter="url(#sh)"><rect x="326" y="536" width="270" height="112" rx="11" fill="#ffffff" stroke="#2a8a7f" stroke-width="1.6"/></g>
  <rect x="326" y="536" width="270" height="7" rx="3.5" fill="#2a8a7f"/>
  <text x="342" y="566" class="t ttl" font-size="13">Perceptor</text>
  <text x="342" y="565" class="mut" font-size="0"></text>
  <text x="342" y="589" class="desc" font-size="11.5">masked-frame &#187; symbolic state</text>
  <text x="342" y="609" class="desc mut" font-size="11">the perceive&#187;world boundary</text>
  <text x="342" y="633" class="desc code" fill="#2a8a7f" font-size="11">CodePerceptor</text>

  <!-- L2 transition (blue) : the generated program -->
  <g filter="url(#sh)"><rect x="626" y="536" width="286" height="112" rx="11" fill="#ffffff" stroke="#1f4e79" stroke-width="1.6"/></g>
  <rect x="626" y="536" width="286" height="7" rx="3.5" fill="#1f4e79"/>
  <text x="642" y="566" class="t ttl" font-size="13">Dynamics</text>
  <text x="642" y="589" class="desc" font-size="11.5">the synthesized <tspan class="code" font-size="11">predict()</tspan></text>
  <text x="642" y="609" class="desc mut" font-size="11">the generated program <tspan font-style="italic">is</tspan> the model</text>
  <text x="642" y="633" class="desc code" fill="#1f4e79" font-size="11">FunctionTransition</text>
  <!-- arrow from Synthesize down into Dynamics -->
  <path d="M688,298 C688,470 760,452 769,536" stroke="#c8881f" stroke-width="1.6" fill="none" stroke-dasharray="4 4" opacity="0.75" marker-end="url(#arO)"/>

  <!-- L3 objective (green) -->
  <g filter="url(#sh)"><rect x="942" y="536" width="270" height="112" rx="11" fill="#ffffff" stroke="#2a8a3e" stroke-width="1.6"/></g>
  <rect x="942" y="536" width="270" height="7" rx="3.5" fill="#2a8a3e"/>
  <text x="958" y="566" class="t ttl" font-size="13">Objective</text>
  <text x="958" y="589" class="desc" font-size="11.5">reward = <tspan class="code" font-size="11">levels_completed</tspan></text>
  <text x="958" y="609" class="desc mut" font-size="11">the induced win condition</text>
  <text x="958" y="633" class="desc code" fill="#2a8a3e" font-size="11">CodeObjective</text>

  <!-- layer connectors -->
  <path d="M596,592 L626,592" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>
  <path d="M912,592 L942,592" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>

  <text x="769" y="690" text-anchor="middle" class="mut" font-size="12">to_spec &#187; validate &#187; download, re-run, and serve at  openworld serve /view</text>

  <!-- footer legend -->
  <g font-size="11.5">
    <rect x="40" y="452" width="13" height="13" rx="3" fill="#2a8a7f"/><text x="59" y="463" class="mut">perception</text>
    <rect x="150" y="452" width="13" height="13" rx="3" fill="#1f4e79"/><text x="169" y="463" class="mut">state / dynamics</text>
    <rect x="300" y="452" width="13" height="13" rx="3" fill="#c8881f"/><text x="319" y="463" class="mut">generate program / act</text>
    <rect x="500" y="452" width="13" height="13" rx="3" fill="#2a8a3e"/><text x="519" y="463" class="mut">verify / win</text>
  </g>
</svg>
